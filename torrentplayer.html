<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Torrent Video Player</title>
  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .box {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 80%;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #00c853;
      color: #fff;
      cursor: pointer;
    }
    video {
      width: 90%;
      margin-top: 20px;
      border-radius: 10px;
      background: black;
    }
    #status {
      margin-top: 10px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>🎬 Torrent Video Player</h2>

    <!-- Magnet Input -->
    <input type="text" id="magnet" placeholder="Paste Magnet Link Here">

    <br>OR<br>

    <!-- Torrent File Upload -->
    <input type="file" id="torrentFile" accept=".torrent">

    <br>

    <button onclick="startStreaming()">Start Streaming</button>

    <div id="status">Waiting for input...</div>
  </div>

  <!-- Video Player -->
  <video id="video" controls></video>

  <script>
    const client = new WebTorrent()
    const statusEl = document.getElementById('status')
    const video = document.getElementById('video')

    function startStreaming() {
      const magnet = document.getElementById('magnet').value
      const fileInput = document.getElementById('torrentFile').files[0]

      if (!magnet && !fileInput) {
        alert("Please enter magnet link or upload torrent file")
        return
      }

      statusEl.innerText = "Connecting to peers..."

      const torrentId = magnet || fileInput

      client.add(torrentId, function (torrent) {
        statusEl.innerText = "Downloading metadata..."

        // Find first playable video file
        const file = torrent.files.find(file =>
          file.name.endsWith('.mp4') ||
          file.name.endsWith('.webm') ||
          file.name.endsWith('.ogg')
        )

        if (!file) {
          statusEl.innerText = "No supported video file found!"
          return
        }

        statusEl.innerText = "Buffering & starting video..."

        // Stream to video element
        file.renderTo(video)

        // Progress update
        torrent.on('download', () => {
          const progress = (torrent.progress * 100).toFixed(2)
          const speed = (torrent.downloadSpeed / 1024 / 1024).toFixed(2)

          statusEl.innerText = `Streaming... ${progress}% | Speed: ${speed} MB/s`
        })
      })
    }
  </script>

</body>
</html>
