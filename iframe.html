<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iframe Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }

        .error {
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-family: Arial;
        }
    </style>
</head>
<body>

<iframe id="player"></iframe>

<script>
    function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    const videoUrl = getQueryParam('url');

    if (videoUrl) {
        document.getElementById('player').src = videoUrl;
    } else {
        document.body.innerHTML = '<div class="error">No URL provided</div>';
    }
</script>

</body>
</html>
